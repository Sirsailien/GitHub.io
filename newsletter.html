<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" data-i18n="newsletter.meta.description">
    <title data-i18n="newsletter.meta.title"></title>
    <link rel="icon" type="image/x-icon" href="./assets/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png">
    <link rel="manifest" href="./assets/favicon/site.webmanifest">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#e9d7bd',
                        secondary: '#B99A81',
                        accent: '#333333',
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body class="bg-primary text-gray-100">
<div id="top-of-page"></div>

<!-- Newsletter Banner -->
<section class="pt-32 pb-20 bg-secondary">
  <div class="container mx-auto px-6 text-center reveal">

    <h1 class="text-4xl md:text-6xl font-bold mb-6 text-white"
        data-i18n="newsletter.banner.title"></h1>

    <p class="text-xl text-white/90 max-w-3xl mx-auto"
       data-i18n="newsletter.banner.subtitle"></p>

  </div>
</section>

<!-- Newsletter Archive (MailerLite auto archive) -->
<section class="py-20 bg-primary">
  <div class="container mx-auto px-6 reveal-stagger">
    <div class="max-w-4xl mx-auto">
      <h2 class="text-3xl md:text-4xl font-bold mb-6 text-white text-center text-shadow-subtle"
          data-i18n="newsletter.archive.title"></h2>

      <p class="text-lg text-gray-700/90 mb-8 text-center"
         data-i18n="newsletter.archive.subtitle"></p>

      <div class="relative z-0 rounded-2xl overflow-hidden shadow-2xl border border-black/10">
        <iframe
          src="https://subscribepage.io/FnkP9b"
          loading="lazy"
          title="Newsletter archive"
          style="width:100%; height:75vh; border:0;"
        ></iframe>
      </div>
    </div>
  </div>
</section>

<!-- Newsletter Section -->
<section class="py-20 bg-primary/10">
    <div class="container mx-auto px-6 reveal">
        <div class="max-w-2xl mx-auto text-center">
            <h2 class="text-3xl md:text-4xl font-bold mb-6 text-white text-shadow-subtle" data-i18n="about.news.title"></h2>

            <p class="text-lg text-gray-700/90 mb-8" data-i18n="about.news.subtitle"></p>

           <form class="grid grid-cols-1 sm:grid-cols-2 gap-4"
      action="https://api.web3forms.com/submit" method="POST">
  <input type="hidden" name="access_key" value="23b78eca-0057-41c8-b9d3-3461f44a1940">

  <div class="sm:flex-1">
    <input type="text"
           name="name"
           required
            placeholder=""
            data-i18n-placeholder="about.news.name"
           class="w-full px-6 py-3 bg-white/10 border border-white/40 rounded-lg focus:outline-none focus:ring-2 focus:ring-accent text-black placeholder-black/30">
  </div>

  <div class="sm:flex-1">
    <input type="email"
           name="email"
           required
           placeholder=""
            data-i18n-placeholder="about.news.email"
           class="w-full px-6 py-3 bg-white/10 border border-white/40 rounded-lg focus:outline-none focus:ring-2 focus:ring-accent text-black placeholder-black/30">
  </div>

  <button type="submit"
          class="sm:col-span-2 bg-accent hover:bg-accent/90 text-white px-8 py-3 rounded-lg font-medium transition-all shadow-lg" data-i18n="about.news.button">
  </button>
</form>
            <p class="text-sm text-black-200/70 mt-4">
            <a href="https://drive.google.com/file/d/1Plbt774JwQTBChUM1iTGbqXN_gj77_e3/view?usp=share_link" 
            target="_blank"
                rel="noopener noreferrer"
            class="underline hover:text-black" data-i18n="footer.ps"></a></p>
        </div>
    </div>
</section>




<!-- Footer -->
<div id="footer-container"></div>

<!-- JS -->
<script src="./assets/JS/layout.js" defer></script>
<script src="./assets/JS/site.js" defer></script>
<script src="./assets/JS/lang.js" defer></script>

</body>
</html>
