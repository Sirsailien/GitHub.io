<body class="bg-primary text-gray-100">
    <div id="top-of-page"></div>


    <!-- Hero Section with Video Background -->
    <section id="hero-video" class="video-container cursor-pointer"
    data-overlay-src="./assets/video/Reel2026.mp4"
    data-overlay-autoplay="true">
        <video autoplay muted loop class="w-full h-full">
            <source src="./assets/video/Reel2026.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
            <div class="text-center px-4">
                <h1 data-i18n="index.hero.title" class="text-5xl md:text-7xl text-shadow-cinematic font-bold mb-6 text-white "></h1>
                <p data-i18n="index.hero.subtitle" class="text-xl md:text-2xl text-shadow-cinematic text-white max-w-2xl mx-auto mb-8"></p>
                <div class="flex justify-center space-x-4">
                    <a href="#" id="hero-portfolio-btn" data-open-portfolio="true" data-i18n="index.hero.button_portfolio" class="bg-white text-gray-700 px-6 py-3 rounded-full font-medium hover:bg-gray-100 transition-all"></a>
                    <a href="#booking-contact" data-no-hero-overlay data-i18n="index.hero.button_contact" class="border-2 border-white text-white px-6 py-3 rounded-full font-medium hover:bg-white/10 transition-all"></a>
                </div>
            </div>
        </div>
    </section>

    <!-- About Section -->
    <section id="about" class="py-20 bg-primary reveal">
        <div class="container mx-auto px-6 reveal-stagger">
            <div class="flex flex-col md:flex-row items-center reveal-stagger">
                <div class="md:w-1/2 mb-10 md:mb-0">
                    <img src="./assets/Images/fotoshoot/Django-22.jpg" alt="Profile" class="rounded-lg shadow-2xl w-full mx-auto">
                </div>
                <div class="md:w-1/2 md:pl-12">
                    <h2 class="text-3xl md:text-4xl font-bold mb-6 text-shadow-subtle" data-i18n="index.about.title"></h2>
                    <p class="text-lg text-gray-700 mb-6" data-i18n="index.about.paragraph1"> </p>
                    <p class="text-lg text-gray-700 mb-8" data-i18n="index.about.paragraph2">
                    </p>
                    <div class="flex flex-wrap gap-4 reveal-stagger">
                        <div class="bg-white/10 p-4 rounded-lg">
                            <h3 class="font-bold text-gray-700">200+</h3>
                            <p class="text-gray-700" data-i18n="index.about.projects"></p>
</div>
                        <div class="bg-white/10 p-4 rounded-lg">
                            <h3 class="font-bold text-gray-700">10+</h3>
                            <p class="text-gray-700" data-i18n="index.about.experience"></p>
</div>
                        <div class="bg-white/10 p-4 rounded-lg">
                            <h3 class="font-bold text-gray-700">7+</h3>
                            <p class="text-gray-700" data-i18n="index.about.education"></p>
</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

<!--Brands Section-->
<div class="content">
        <div class="inf-slider__outer-container reveal-stagger">
            <!-- Make inner slider absolute, move with JS, slice elements outside of parent container -->
             <div><h2 class="text-3xl md:text-4xl font-bold mb-12 text-center text-shadow-subtle" data-i18n="index.brands.title"></h2>
            <script type="module" src="./assets/JS/script.js"></script>
            </div>
        </div>
    </div>

    <!-- Portfolio Section -->
    <section id="portfolio" class="py-20 bg-primary/10 reveal-stagger">
<div class="container mx-auto px-6">
            <h2 class="text-3xl md:text-4xl font-bold mb-12 text-center text-shadow-subtle" data-i18n="index.portfolio.title"></h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 reveal-stagger">
                <!-- Portfolio Item 1 -->
                <a href="./commercial" id="commercial" data-featured-id="21" class="group relative overflow-hidden rounded-lg shadow-xl">
                    <img src="./assets/Images/portfolio/Commercial/commercial-thumb.jpg" alt="Commercial Work" class="w-full h-64 object-cover transition-all duration-500 group-hover:scale-105">
                    <div class="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all">
                        <div class="text-center p-4">
                            <h3 class="text-xl font-bold text-white mb-2" data-i18n="index.portfolio.item1"></h3>
                        </div>
                    </div>
                </a>
                
                <!-- Portfolio Item 2 -->
                <a href="./documentaries" id="documentaries" data-featured-id="102" class="group relative overflow-hidden rounded-lg shadow-xl">
                    <img src="./assets/Images/portfolio/Documentary/documentaries-thumb.jpg" alt="Documentaries" class="w-full h-64 object-cover transition-all duration-500 group-hover:scale-105">
                    <div class="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all">
                        <div class="text-center p-4">
                            <h3 class="text-xl font-bold text-white mb-2" data-i18n="index.portfolio.item2"></h3>
                        </div>
                    </div>
                </a>
                <!-- Portfolio Item 3 -->
                <a href="./musicvideos" id="musicvideos" data-featured-id="305" class="group relative overflow-hidden rounded-lg shadow-xl">
                    <img src="./assets/Images/portfolio/Music/music-thumb.jpg" alt="Music Video" class="w-full h-64 object-cover transition-all duration-500 group-hover:scale-105">
                    <div class="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all">
                        <div class="text-center p-4">
                            <h3 class="text-xl font-bold text-white mb-2" data-i18n="index.portfolio.item3"></h3>
                    </div>
                </div>
        </a>
        </div>
            <div class="text-center mt-12">
                <div class="text-center mt-12">
                    <a href="#" data-open-portfolio="true" data-no-hero-overlay data-i18n="index.hero.button_portfolio" class="bg-accent hover:bg-accent/90 text-lg text-gray-100 px-8 py-3 rounded-full font-medium transition-all shadow-lg"></a>
                </div>
            </div>
        </div>
    </section>


<!-- Booking & Contact Section -->
<section id="booking-contact" class="py-20 bg-primary/10 reveal-stagger">
  <div class="container mx-auto px-6">
    <h2 class="text-3xl md:text-4xl font-bold mb-12 text-center text-shadow-subtle" data-i18n="index.booking.title"></h2>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-stretch">

      <!-- Cal card -->
      <div class="flex flex-col h-full overflow-hidden">
        <div class="p-6">
          <h3 class="text-2xl font-bold text-white text-shadow-subtle" data-i18n="index.booking.cal_title"></h3>
          <p class="text-lg text-gray-700 mt-2" data-i18n="index.booking.cal_subtitle"></p>
        </div>
        <div class="p-6 overflow-hidden">
          <div class="cal-embed w-full" id="my-cal-inline-30min"></div>
        </div>
      </div>

      <!-- Web3Forms card -->
      <div class="flex flex-col h-full">

        <div class="p-6">
          <h3 class="text-2xl font-bold text-white text-shadow-subtle" data-i18n="index.booking.form_title"></h3>
          <p class="text-lg text-gray-700 mt-2" data-i18n="index.booking.form_subtitle"></p>
        </div>

        <form class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6"
              action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" value="e06fbc63-33bb-4752-88b4-92eccb64849e">

          <!-- Honeypot -->
          <input type="checkbox" name="botcheck" class="hidden" style="display:none">

          <div>
            <label for="w3_name" class="block text-lg text-gray-700 mb-3" data-i18n="index.contact.name"></label>
            <input type="text" id="w3_name" name="name" required
              class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-accent text-gray-700/90 placeholder-white/50">
          </div>

          <div>
            <label for="w3_email" class="block text-lg text-gray-700 mb-3" data-i18n="index.contact.email"></label>
            <input type="email" id="w3_email" name="email" required
              class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-accent text-gray-700/90 placeholder-white/50">
          </div>

          <div class="md:col-span-2">
            <label for="w3_message" class="block text-lg text-gray-700 mb-3" data-i18n="index.contact.message"></label>
            <textarea id="w3_message" name="message" rows="10" required
              class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-accent text-gray-700/90 placeholder-white/50"></textarea>
          </div>

          <div class="md:col-span-2 flex flex-col gap-3 items-center">
            <button type="submit"
              class="bg-accent hover:bg-accent/90 text-lg text-gray-100 px-8 py-3 rounded-full font-medium transition-all shadow-lg"
              data-i18n="index.contact.button"></button>

            <p class="text-center text-sm text-black-200/70">
              <a href="https://drive.google.com/file/d/1nmCU-GdmfOtBh-990QUE7nv2Dl1tzGKD/view?usp=sharing" 
                target="_blank"
                rel="noopener noreferrer"
              class="underline hover:text-black" data-i18n="footer.ps"></a>
            </p>
          </div>
        </form>
      </div>

    </div>
  </div>
</section>
<!-- Cal inline embed code-->
<script defer src="./assets/JS/cal30min.js"></script>

<!-- Video Overlay (used for hero + portfolio overlays) -->
<div id="video-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-md opacity-0 pointer-events-none transition-all duration-300 flex justify-center items-end z-50">
  <div id="video-box" class="bg-white rounded-t-2xl shadow-2xl w-full max-w-6xl h-[90vh] md:h-[85vh] transform translate-y-full transition-all duration-500 overflow-hidden"> 
<button id="video-close-btn" aria-label="Close video popup"
  class="absolute top-3 right-3 z-50 w-11 h-11 flex items-center justify-center rounded-full bg-black/60 hover:bg-black/80 text-white text-2xl leading-none backdrop-blur-md transition">
  &times;
</button>

    <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 h-full">

      <!-- Video -->
      <div id="video-media" class="relative w-full h-[40vh] md:h-full">
        <iframe id="video-frame" class="absolute inset-0 w-full h-full"
                frameborder="0"
                allow="autoplay; accelerometer; fullscreen; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
        </iframe>

      <video id="video-native" class="absolute inset-0 w-full h-full hidden" playsinline controls></video>
      </div>

      <div id="video-text" class="p-6">
        <h2 id="video-title" class="text-2xl font-bold mb-3"></h2>
        <p id="video-desc" class="text-gray-700 mb-4"></p>

        <h3 class="font-semibold text-gray-800" data-i18n="commercial.defaulttext.credits"></h3>
        <ul id="video-credits" class="list-disc ml-6 text-gray-700 mb-4"></ul>

        <h3 class="font-semibold text-gray-800" data-i18n="commercial.defaulttext.role"></h3>
        <p id="video-role" class="text-gray-700"></p>
      </div>
    </div>
  </div>
</div>

  <!-- Footer-->
  <div id="footer-container"></div>

  <!-- JS -->
  <script src="./assets/JS/layout.js" defer></script>
  <script src="./assets/JS/site.js" defer></script>
<script src="./assets/JS/videoOverlay.js" defer></script>

<script src="./assets/JS/lang.js" defer></script>
