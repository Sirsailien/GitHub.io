<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" data-i18n="documentaries.meta.description" content="">
    <title data-i18n="documentaries.meta.title"></title>
    <link rel="icon" type="image/x-icon" href="./assets/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png">
    <link rel="manifest" href="./assets/favicon/site.webmanifest">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#e9d7bd',
                        secondary: '#B99A81',
                        accent: '#333333',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="bg-primary text-gray-100">
<div id="top-of-page"></div>

<!-- Documentaries Banner -->
<section class="page-banner">
    <div class="page-banner__inner">
        <div class="page-banner__content">
            <h1 class="page-banner__title" data-i18n="documentaries.banner.title"></h1>
            <p class="page-banner__subtitle" data-i18n="documentaries.banner.subtitle"></p>
        </div>
    </div>
</section>

<!-- Portfolio Grid -->
<section class="py-20 bg-primary">
  <div class="container mx-auto px-6">
    <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
  </div>
</section>

<!-- Video Overlay -->
<div id="video-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-md opacity-0 pointer-events-none transition-all duration-300 flex justify-center items-end z-50">
  <div id="video-box" class="bg-white rounded-t-2xl shadow-2xl w-full max-w-6xl h-[90vh] md:h-[85vh] transform translate-y-full transition-all duration-500 overflow-hidden">
  <button id="video-close-btn" aria-label="Close video popup"
  class="absolute top-3 right-3 z-50 w-11 h-11 flex items-center justify-center rounded-full bg-black/60 hover:bg-black/80 text-white text-2xl leading-none backdrop-blur-md transition">
  &times;
</button>
    <div class="grid grid-cols-1 md:grid-cols-2 h-full">

      <!-- Video -->
      <div class="relative w-full h-[40vh] md:h-full">
        <iframe id="video-frame" class="absolute inset-0 w-full h-full"
                frameborder="0"
                allow="accelerometer; fullscreen; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
        </iframe>
      </div>

      <!-- Text -->
      <div class="p-6">
        <h2 id="video-title" class="text-2xl font-bold mb-3"></h2>
        <p id="video-desc" class="text-gray-700 mb-4"></p>

        <h3 class="font-semibold text-gray-800" data-i18n="commercial.defaulttext.credits"></h3>
        <ul id="video-credits" class="list-disc ml-6 text-gray-700 mb-4"></ul>

        <h3 class="font-semibold text-gray-800" data-i18n="commercial.defaulttext.role"></h3>
        <p id="video-role" class="text-gray-700"></p>
      </div>

    </div>
  </div>
</div>


<!-- Footer-->
<div id="footer-container"></div>

<!-- JS -->
<script src="./assets/JS/layout.js" defer></script>
<script src="./assets/JS/site.js" defer></script>
<script src="./assets/JS/videoOverlay.js" defer></script>
<script src="./assets/JS/portfolio-documentaries.js" defer></script>
<script src="./assets/JS/lang.js" defer></script>
</body>
</html>
