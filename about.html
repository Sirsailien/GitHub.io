<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" data-i18n="about.meta.description">
    <title data-i18n="about.meta.title"></title>
    <link rel="icon" type="image/x-icon" href="./assets/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png">
    <link rel="manifest" href="./assets/favicon/site.webmanifest">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script>
                        tailwind.config = {
                            theme: {
                                extend: {
                                    colors: {
                                        primary: '#e9d7bd',
                                        secondary: '#B99A81',
                                        accent: '#333333',
}
                                }
                            }
                        }
</script>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="bg-primary text-gray-100">
<div id="top-of-page"></div>




<!-- About Banner -->
<section class="pt-32 pb-20 bg-secondary reveal-stagger">
    <div class="container mx-auto px-6 text-center reveal-stagger">
        <h1 class="text-4xl md:text-6xl font-bold mb-6 text-white" data-i18n="about.banner.title"></h1>
        <p class="text-xl text-white/90 max-w-3xl mx-auto" data-i18n="about.banner.subtitle"></p>
    </div>
</section>

<!-- Photo and Text Block Section -->
<section class="py-20 bg-primary reveal-stagger">
    <div class="container mx-auto px-6">
        <div class="flex flex-col md:flex-row items-center">
            <div class="md:w-1/2 mb-10 md:mb-0 md:pr-8 ">
                <img src="./assets/Images/fotoshoot/Django-18.jpg" alt="Django van den Busken">
            </div>
            <div class="md:w-1/2">
                <h2 class="text-3xl md:text-4xl font-bold mb-6 text-white reveal-stagger" data-i18n="about.section.name"></h2>

                <p class="text-lg text-gray-700 mb-6" data-i18n="about.section.paragraph1"></p>
                <p class="text-lg text-gray-700 mb-6" data-i18n="about.section.paragraph2"></p>
                <p class="text-lg text-gray-700 mb-6" data-i18n="about.section.paragraph3"></p>

                <div class="flex flex-wrap gap-4 reveal-stagger">
                    <div class="bg-white/10 p-4 rounded-lg">
                        <h3 class="font-bold text-gray-800" data-i18n="about.section.stat_experience_value"></h3>
                        <p class="text-gray-700" data-i18n="about.section.stat_experience_label"></p>
                    </div>
                    <div class="bg-white/10 p-4 rounded-lg">
                        <h3 class="font-bold text-gray-800" data-i18n="about.section.stat_projects_value"></h3>
                        <p class="text-gray-700" data-i18n="about.section.stat_projects_label"></p>
                    </div>
                    <div class="bg-white/10 p-4 rounded-lg">
                        <h3 class="font-bold text-gray-800" data-i18n="about.section.stat_awards_value"></h3>
                        <p class="text-gray-700" data-i18n="about.section.stat_awards_label"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!--Brands Section-->
<div class="content">
        <div class="inf-slider__outer-container reveal-stagger">
            <!-- Make inner slider absolute, move with JS, slice elements outside of parent container -->
             <div><h2 class="text-3xl md:text-4xl font-bold mb-12 text-center text-shadow-subtle" data-i18n="index.brands.title"></h2>
            <script type="module" src="./assets/JS/script.js"></script>
            </div>
        </div>
    </div>

<!-- Newsletter Section -->
<section class="py-20 bg-primary/10">
    <div class="container mx-auto px-6 reveal">
        <div class="max-w-2xl mx-auto text-center">
            <h2 class="text-3xl md:text-4xl font-bold mb-6 text-white text-shadow-subtle" data-i18n="about.news.title"></h2>

            <p class="text-lg text-gray-700 mb-8" data-i18n="about.news.subtitle"></p>

           <form class="grid grid-cols-1 sm:grid-cols-2 gap-4"
      action="https://api.web3forms.com/submit" method="POST">
  <input type="hidden" name="access_key" value="23b78eca-0057-41c8-b9d3-3461f44a1940">

  <div class="sm:flex-1">
    <input type="text"
           name="name"
           required
            placeholder=""
            data-i18n-placeholder="about.news.name"
           class="w-full px-6 py-3 bg-white/10 border border-white/40 rounded-lg focus:outline-none focus:ring-2 focus:ring-accent text-black placeholder-black/30">
  </div>

  <div class="sm:flex-1">
    <input type="email"
           name="email"
           required
           placeholder=""
            data-i18n-placeholder="about.news.email"
           class="w-full px-6 py-3 bg-white/10 border border-white/40 rounded-lg focus:outline-none focus:ring-2 focus:ring-accent text-black placeholder-black/30">
  </div>

  <button type="submit"
          class="sm:col-span-2 bg-accent hover:bg-accent/90 text-white px-8 py-3 rounded-full font-medium transition-all shadow-lg" data-i18n="about.news.button">
  </button>
</form>
            <p class="text-sm text-black-200/70 mt-4 text-shadow-subtle">
            <a href="https://drive.google.com/file/d/1Plbt774JwQTBChUM1iTGbqXN_gj77_e3/view?usp=sharing" 
            target="_blank"
                rel="noopener noreferrer"
            class="underline hover:text-black" data-i18n="footer.ps"></a></p>
        </div>
    </div>
</section>

  <!-- Footer-->
  <div id="footer-container"></div>

  <!-- JS -->
  <script src="./assets/JS/layout.js" defer></script>
  <script src="./assets/JS/site.js" defer></script>
  <script src="./assets/JS/lang.js" defer></script>
</body>
</html>
