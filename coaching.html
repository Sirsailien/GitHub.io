<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" data-i18n="coaching.meta.description">
    <title data-i18n="coaching.meta.title"></title>
    <link rel="icon" type="image/x-icon" href="./assets/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png">
    <link rel="manifest" href="./assets/favicon/site.webmanifest">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#e9d7bd',
                        secondary: '#B99A81',
                        accent: '#333333',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="bg-primary text-gray-100">
<div id="top-of-page"></div>

<!-- Coaching Banner -->
<section class="page-banner">
    <div class="page-banner__inner">
        <div class="page-banner__content">
            <h1 class="page-banner__title" data-i18n="coaching.banner.title"></h1>
            <p class="page-banner__subtitle" data-i18n="coaching.banner.subtitle"></p>
        </div>
    </div>
</section>

<!-- Text Block with Image -->
<section class="py-20 bg-primary">
    <div class="container mx-auto px-6 reveal-stagger">
        <div class="flex flex-col md:flex-row items-center">
            <div class="md:w-1/2 mb-10 md:mb-0 md:pr-8">
                <img src="./assets/Images/fotoshoot/Django-19.jpg" alt="Coaching" class="rounded-lg shadow-2xl w-full">
            </div>
            <div class="md:w-1/2">
                <h2 class="text-3xl md:text-4xl font-bold mb-6 text-white text-shadow-subtle" data-i18n="coaching.section.title"></h2>

                <p class="text-lg text-gray-700 mb-6" data-i18n="coaching.section.p1"></p>
                <p class="text-lg text-gray-700 mb-6" data-i18n="coaching.section.p2"></p>
                <p class="text-lg text-gray-700 mb-6" data-i18n="coaching.section.p3"></p>

                <div class="flex flex-wrap gap-4 reveal-stagger">
                    <div class="bg-white/10 p-4 rounded-lg">
                        <h3 class="font-bold text-gray-800" data-i18n="coaching.section.skill1.title"></h3>
                        <p class="text-gray-700" data-i18n="coaching.section.skill1.desc"></p>
                    </div>

                    <div class="bg-white/10 p-4 rounded-lg">
                        <h3 class="font-bold text-gray-800" data-i18n="coaching.section.skill2.title"></h3>
                        <p class="text-gray-700" data-i18n="coaching.section.skill2.desc"></p>
                    </div>

                    <div class="bg-white/10 p-4 rounded-lg">
                        <h3 class="font-bold text-gray-800" data-i18n="coaching.section.skill3.title"></h3>
                        <p class="text-gray-700" data-i18n="coaching.section.skill3.desc"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Booking & Contact Section -->
<section id="booking-contact" class="py-20 bg-primary/10 reveal-stagger">
  <div class="container mx-auto px-6">
    <h2 class="text-3xl md:text-4xl font-bold mb-12 text-center text-shadow-subtle" data-i18n="index.booking.title"></h2>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-stretch">

      <!-- Cal card -->
      <div class="flex flex-col h-full overflow-hidden">
        <div class="p-6">
          <h3 class="text-2xl font-bold text-white text-shadow-subtle" data-i18n="index.booking.cal_title"></h3>
          <p class="text-lg text-gray-700 mt-2" data-i18n="index.booking.cal_subtitle"></p>
        </div>
        <div class="p-6 overflow-hidden">
          <div class="cal-embed w-full" id="my-cal-inline-30min"></div>
        </div>
      </div>

      <!-- Web3Forms card -->
      <div class="flex flex-col h-full">

        <div class="p-6">
          <h3 class="text-2xl font-bold text-white text-shadow-subtle" data-i18n="index.booking.form_title"></h3>
          <p class="text-lg text-gray-700 mt-2" data-i18n="index.booking.form_subtitle"></p>
        </div>

        <form class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6"
              action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" value="e06fbc63-33bb-4752-88b4-92eccb64849e">

          <!-- OPTIONAL later -->
          <!-- <input type="checkbox" name="botcheck" class="hidden" style="display:none"> -->

          <div>
            <label for="w3_name" class="block text-lg text-gray-700 mb-3" data-i18n="index.contact.name"></label>
            <input type="text" id="w3_name" name="name" required
              class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-accent text-gray-700/90 placeholder-white/50">
          </div>

          <div>
            <label for="w3_email" class="block text-lg text-gray-700 mb-3" data-i18n="index.contact.email"></label>
            <input type="email" id="w3_email" name="email" required
              class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-accent text-gray-700/90 placeholder-white/50">
          </div>

          <div class="md:col-span-2">
            <label for="w3_message" class="block text-lg text-gray-700 mb-3" data-i18n="index.contact.message"></label>
            <textarea id="w3_message" name="message" rows="10" required
              class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-accent text-gray-700/90 placeholder-white/50"></textarea>
          </div>

          <div class="md:col-span-2 flex flex-col gap-3 items-center">
            <button type="submit"
              class="bg-accent hover:bg-accent/90 text-lg text-gray-100 px-8 py-3 rounded-full font-medium transition-all shadow-lg"
              data-i18n="index.contact.button"></button>

            <p class="text-center text-sm text-black-200/70">
              <a href="https://drive.google.com/file/d/1Plbt774JwQTBChUM1iTGbqXN_gj77_e3/view?usp=share_link"
              target="_blank"
                rel="noopener noreferrer"
              class="underline hover:text-black" data-i18n="footer.ps"></a>
            </p>
          </div>
        </form>
      </div>

    </div>
  </div>
</section>
<!-- Cal inline embed code-->
<script defer src="./assets/JS/cal30min.js"></script>

<!-- Footer -->
<div id="footer-container"></div>

<!-- JS -->
<script src="./assets/JS/layout.js" defer></script>
<script src="./assets/JS/site.js" defer></script>
<script src="./assets/JS/lang.js" defer></script>
</body>
</html>
